{% extends 'portfolio/base.html' %}

{% block content %}

<div class="tags-box">
  <h2>Tags</h2>
  <ul>
    {% for tag in tags_with_counts %}
    <li>
      <a href="{% url 'blog_by_tag' tag.name %}">{{ tag.name }} ({{ tag.count }})</a>
    </li>
    {% endfor %}
  </ul>
</div>
<br>
<h1>Check my resume out below:</h1>
<br>
<h2><a href="{{ resume.upload.url }}" target="_blank">My Resume</a></h2>
</div>

{% endblock %}
